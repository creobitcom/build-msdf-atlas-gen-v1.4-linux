# Сборка ПОЛНОСТЬЮ СТАТИЧЕСКОГО msdf-atlas-gen v1.4 (Linux x86_64) для пина в домене.
# Отличие от предыдущего: (1) ubuntu-22.04 (низкий glibc-этаж), (2) все зависимости — из исходников STATIC,
# (3) ЧАСТИЧНЫЙ static: -static-libgcc/-static-libstdc++ + static deps (freetype/png/zlib) — glibc ДИНАМИЧЕСКИЙ.
#     ПОЛНЫЙ -static НЕ используем: статический glibc ломает FreeType (segfault). Строим на ubuntu-22.04 → glibc floor 2.35.
# (4) `-ffp-contract=off` — против float-дрейфа (детерминизм, панель D1), (5) пиннутые версии deps → воспроизводимо.
name: Build msdf-atlas-gen v1.4 (static Linux x86_64)

on:
  workflow_dispatch:

env:
  PREFIX: ${{ github.workspace }}/deps
  ZLIB_VER: "1.3.1"
  PNG_VER: "1.6.43"
  FT_VER: "2.13.3"
  # -ffp-contract=off: одинаковый float на разных CPU/сборках (детерминизм MSDF); -fPIC: линкуемость .a
  DFLAGS: "-O2 -ffp-contract=off -fPIC"

jobs:
  build-linux:
    name: Build static Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git wget tar fonts-dejavu-core

      - name: Build zlib (static)
        run: |
          wget -q --timeout=30 --tries=3 https://zlib.net/fossils/zlib-${ZLIB_VER}.tar.gz
          tar xf zlib-${ZLIB_VER}.tar.gz && cd zlib-${ZLIB_VER}
          CFLAGS="$DFLAGS" ./configure --static --prefix="$PREFIX"
          make -j"$(nproc)" && make install

      - name: Build libpng (static, против static zlib)
        run: |
          wget -q --timeout=30 --tries=3 https://download.sourceforge.net/libpng/libpng-${PNG_VER}.tar.gz
          tar xf libpng-${PNG_VER}.tar.gz && cd libpng-${PNG_VER}
          CFLAGS="$DFLAGS" CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            ./configure --disable-shared --enable-static --prefix="$PREFIX"
          make -j"$(nproc)" && make install

      - name: Build FreeType (static, минимальный — без harfbuzz/png/brotli/bzip2)
        run: |
          wget -q --timeout=30 --tries=3 https://download.savannah.gnu.org/releases/freetype/freetype-${FT_VER}.tar.gz \
            || wget -q --timeout=30 --tries=3 -O freetype-${FT_VER}.tar.gz https://downloads.sourceforge.net/project/freetype/freetype2/${FT_VER}/freetype-${FT_VER}.tar.gz
          tar xf freetype-${FT_VER}.tar.gz && cd freetype-${FT_VER}
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_DISABLE_HARFBUZZ=TRUE \
            -DFT_DISABLE_PNG=TRUE \
            -DFT_DISABLE_BROTLI=TRUE \
            -DFT_DISABLE_BZIP2=TRUE \
            -DCMAKE_C_FLAGS="$DFLAGS"
          cmake --build build && cmake --install build

      - name: Clone msdf-atlas-gen v1.4
        run: git clone --branch v1.4 --recurse-submodules https://github.com/Chlumsky/msdf-atlas-gen.git src

      - name: Configure msdf-atlas-gen (fully static)
        run: |
          cmake -S src -B src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMSDF_ATLAS_USE_VCPKG=OFF \
            -DMSDF_ATLAS_USE_SKIA=OFF \
            -DMSDF_ATLAS_INSTALL=OFF \
            -DMSDF_ATLAS_BUILD_STANDALONE=ON \            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_FIND_LIBRARY_SUFFIXES=".a" \
            -DFREETYPE_INCLUDE_DIRS="$PREFIX/include/freetype2" \
            -DFREETYPE_LIBRARY="$PREFIX/lib/libfreetype.a" \
            -DPNG_PNG_INCLUDE_DIR="$PREFIX/include" \
            -DPNG_LIBRARY="$PREFIX/lib/libpng16.a" \
            -DZLIB_INCLUDE_DIR="$PREFIX/include" \
            -DZLIB_LIBRARY="$PREFIX/lib/libz.a" \
            -DCMAKE_CXX_FLAGS="$DFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build src/build --config Release

      - name: Verify (частичный static + РЕАЛЬНЫЙ смоук-рендер)
        run: |
          BIN=src/build/bin/msdf-atlas-gen
          file "$BIN"
          echo "=== .so-зависимости (допустим ТОЛЬКО glibc: libc/libm/ld-linux) ==="
          ldd "$BIN" || true
          BAD=$(ldd "$BIN" 2>/dev/null | grep -iE "libfreetype|libpng|libstdc\\+\\+|libgcc_s|libz\\.so" || true)
          if [ -n "$BAD" ]; then echo "FAIL: остались динамические deps:"; echo "$BAD"; exit 1; fi
          echo "OK: freetype/png/zlib/stdc++ вкомпилированы статически"
          echo "=== glibc floor (ubuntu-22.04 → ≤ 2.35, запустится в песочнице) ==="
          objdump -T "$BIN" | grep -o "GLIBC_[0-9.]*" | sort -uV | tail -1
          echo "=== СМОУК: реально генерируем атлас (НЕ -version — он segfault-ит на этом туле) ==="
          "$BIN" -font /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf -chars "65, 66" -type msdf -size 32 -pxrange 4 -imageout smoke.png -json smoke.json
          test -s smoke.png && test -s smoke.json && echo "OK: атлас сгенерирован — БИНАРЬ РАБОЧИЙ" || { echo "FAIL: бинарь не создал атлас (сломан)"; exit 1; }

      - name: Package
        run: |
          cp src/build/bin/msdf-atlas-gen msdf-atlas-gen
          chmod +x msdf-atlas-gen
          echo "sha256 (для tool_version в build_input_hash):"
          sha256sum msdf-atlas-gen | tee msdf-atlas-gen.sha256
          tar -czf msdf-atlas-gen-v1.4-linux-x86_64-static.tar.gz msdf-atlas-gen msdf-atlas-gen.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msdf-atlas-gen-v1.4-linux-x86_64-static
          path: msdf-atlas-gen-v1.4-linux-x86_64-static.tar.gz
