# Сборка msdf-atlas-gen v1.4 для Linux x86_64.
# Цель: получить переносимый бинарник для Linux-песочницы.
# Стратегия:
# - ubuntu-22.04, чтобы glibc floor был не выше 2.35;
# - zlib/libpng/freetype собираются как static .a;
# - libgcc/libstdc++ линкуются статически;
# - glibc остаётся динамическим: полный -static здесь не используем, потому что статический glibc может ломать FreeType;
# - смоук-рендер best-effort: если рендер/парсинг charset падает, artifact всё равно загружается после критичных проверок линковки.

name: Build msdf-atlas-gen v1.4 (static Linux x86_64)

on:
  workflow_dispatch:

env:
  PREFIX: ${{ github.workspace }}/deps
  ZLIB_VER: "1.3.1"
  PNG_VER: "1.6.43"
  FT_VER: "2.13.3"
  DFLAGS: "-O2 -ffp-contract=off -fPIC"

jobs:
  build-linux:
    name: Build static Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            wget \
            tar \
            fonts-dejavu-core \
            binutils \
            file

      - name: Build zlib static
        run: |
          wget -q --timeout=30 --tries=3 https://zlib.net/fossils/zlib-${ZLIB_VER}.tar.gz
          tar xf zlib-${ZLIB_VER}.tar.gz
          cd zlib-${ZLIB_VER}
          CFLAGS="$DFLAGS" ./configure --static --prefix="$PREFIX"
          make -j"$(nproc)"
          make install

      - name: Build libpng static
        run: |
          wget -q --timeout=30 --tries=3 https://download.sourceforge.net/libpng/libpng-${PNG_VER}.tar.gz
          tar xf libpng-${PNG_VER}.tar.gz
          cd libpng-${PNG_VER}
          CFLAGS="$DFLAGS" \
          CPPFLAGS="-I$PREFIX/include" \
          LDFLAGS="-L$PREFIX/lib" \
            ./configure --disable-shared --enable-static --prefix="$PREFIX"
          make -j"$(nproc)"
          make install

      - name: Build FreeType static minimal
        run: |
          wget -q --timeout=30 --tries=3 https://download.savannah.gnu.org/releases/freetype/freetype-${FT_VER}.tar.gz \
            || wget -q --timeout=30 --tries=3 -O freetype-${FT_VER}.tar.gz https://downloads.sourceforge.net/project/freetype/freetype2/${FT_VER}/freetype-${FT_VER}.tar.gz
          tar xf freetype-${FT_VER}.tar.gz
          cd freetype-${FT_VER}
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_DISABLE_HARFBUZZ=TRUE \
            -DFT_DISABLE_PNG=TRUE \
            -DFT_DISABLE_BROTLI=TRUE \
            -DFT_DISABLE_BZIP2=TRUE \
            -DCMAKE_C_FLAGS="$DFLAGS"
          cmake --build build
          cmake --install build

      - name: Clone msdf-atlas-gen v1.4
        run: |
          git clone --branch v1.4 --recurse-submodules https://github.com/Chlumsky/msdf-atlas-gen.git src

      - name: Configure msdf-atlas-gen
        run: |
          cmake -S src -B src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMSDF_ATLAS_USE_VCPKG=OFF \
            -DMSDF_ATLAS_USE_SKIA=OFF \
            -DMSDF_ATLAS_INSTALL=OFF \
            -DMSDF_ATLAS_BUILD_STANDALONE=ON \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_FIND_LIBRARY_SUFFIXES=".a" \
            -DFREETYPE_INCLUDE_DIRS="$PREFIX/include/freetype2" \
            -DFREETYPE_LIBRARY="$PREFIX/lib/libfreetype.a" \
            -DPNG_PNG_INCLUDE_DIR="$PREFIX/include" \
            -DPNG_LIBRARY="$PREFIX/lib/libpng16.a" \
            -DZLIB_INCLUDE_DIR="$PREFIX/include" \
            -DZLIB_LIBRARY="$PREFIX/lib/libz.a" \
            -DCMAKE_C_FLAGS="$DFLAGS" \
            -DCMAKE_CXX_FLAGS="$DFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

      - name: Build
        run: |
          cmake --build src/build --config Release

      - name: Verify binary and best-effort smoke render
        run: |
          BIN=src/build/bin/msdf-atlas-gen

          echo "=== Binary ==="
          file "$BIN"

          echo "=== .so-зависимости: допустимы только glibc/libm/ld-linux/linux-vdso ==="
          ldd "$BIN" || true
          BAD=$(ldd "$BIN" 2>/dev/null | grep -iE "libfreetype|libpng|libstdc\\+\\+|libgcc_s|libz\\.so" || true)
          if [ -n "$BAD" ]; then
            echo "FAIL: остались динамические зависимости, которые должны быть статическими:"
            echo "$BAD"
            exit 1
          fi
          echo "OK: freetype/png/zlib/stdc++ вкомпилированы статически"

          echo "=== glibc floor: ubuntu-22.04 должен дать максимум GLIBC_2.35 ==="
          objdump -T "$BIN" | grep -o "GLIBC_[0-9.]*" | sort -uV | tail -1 || true

          echo "=== СМОУК best-effort: рендер НЕ блокирует Package/Upload ==="
          FT=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf

          # В msdf-atlas-gen v1.4 диапазон charset пишется через запятую: [0x41, 0x42], не через дефис.
          # Официальный -charset ждёт путь к файлу charset.txt.
          printf '[0x41, 0x42]\n' > cs.txt

          if "$BIN" -font "$FT" -charset cs.txt -type msdf -size 32 -pxrange 4 -format png -imageout smoke.png -json smoke.json 2>&1 && test -s smoke.png; then
            echo "OK: atlas generated with charset file"
          elif "$BIN" -font "$FT" -type msdf -size 32 -pxrange 4 -format png -imageout smoke-default-ascii.png -json smoke-default-ascii.json 2>&1 && test -s smoke-default-ascii.png; then
            echo "OK: atlas generated with default ASCII charset"
          else
            echo "WARN: smoke render failed, but critical static-link/glibc checks passed; artifact is still uploaded"
          fi

      - name: Package
        run: |
          cp src/build/bin/msdf-atlas-gen msdf-atlas-gen
          chmod +x msdf-atlas-gen
          echo "sha256 для пина tool_version / build_input_hash:"
          sha256sum msdf-atlas-gen | tee msdf-atlas-gen.sha256
          tar -czf msdf-atlas-gen-v1.4-linux-x86_64-static.tar.gz msdf-atlas-gen msdf-atlas-gen.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msdf-atlas-gen-v1.4-linux-x86_64-static
          path: msdf-atlas-gen-v1.4-linux-x86_64-static.tar.gz
